# Root docker-compose: the full events system (9 services + infra + mocked
# external APIs) in one command:
#
#   docker compose up -d --build
#
# Self-contained by default: every variable has a dev-grade default baked in
# below (same values as .env.example). Copy .env.example to .env to override —
# e.g. point CALCOM_DATABASE_URL at a real cal.com database or swap the
# WireMock endpoints (container `mocks`) for real external APIs.
#
# See docs/architecture/ONBOARDING.md ("Running the whole system") for the
# workflow, and docker/ for the cal.com fixture schema + WireMock mappings.

services:
  # --------------------------------------------------------------------------
  # Infrastructure
  # --------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      # guest/guest only works for localhost connections — containers need a real user.
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-events}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-dev-rabbit-password-01}
    volumes:
      # rabbitmq_prometheus: metrics on :15692/metrics (scraped by the
      # prometheus container in-network — not published to the host).
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./docker/rabbitmq/20-prometheus.conf:/etc/rabbitmq/conf.d/20-prometheus.conf:ro
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PG_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_SUPERUSER_DB:-postgres}
      PG_SAVER_USER: ${PG_SAVER_USER:-event_saver}
      PG_SAVER_PASSWORD: ${PG_SAVER_PASSWORD:-event_saver}
      PG_SAVER_DB: ${PG_SAVER_DB:-event_saver}
      PG_USERS_USER: ${PG_USERS_USER:-event_users}
      PG_USERS_PASSWORD: ${PG_USERS_PASSWORD:-event_users}
      PG_USERS_DB: ${PG_USERS_DB:-event_users}
      PG_NOTIFIER_USER: ${PG_NOTIFIER_USER:-event_notifier}
      PG_NOTIFIER_PASSWORD: ${PG_NOTIFIER_PASSWORD:-event_notifier}
      PG_NOTIFIER_DB: ${PG_NOTIFIER_DB:-event_notifier}
      PG_SHORTENER_USER: ${PG_SHORTENER_USER:-event_shortener}
      PG_SHORTENER_PASSWORD: ${PG_SHORTENER_PASSWORD:-event_shortener}
      PG_SHORTENER_DB: ${PG_SHORTENER_DB:-event_shortener}
      PG_DB_SYNC_USER: ${PG_DB_SYNC_USER:-event_db_sync}
      PG_DB_SYNC_PASSWORD: ${PG_DB_SYNC_PASSWORD:-event_db_sync}
      PG_DB_SYNC_DB: ${PG_DB_SYNC_DB:-event_db_sync}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_SUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # cal.com fixture DB (schema + seed in docker/calcom-init). When .env sets
  # CALCOM_DATABASE_URL to an external cal.com instance this container keeps
  # running but is simply unused by event-booking.
  pg-calcom:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PG_CALCOM_USER:-calcom}
      POSTGRES_PASSWORD: ${PG_CALCOM_PASSWORD:-calcom}
      POSTGRES_DB: ${PG_CALCOM_DB:-calcom}
    volumes:
      - pg-calcom-data:/var/lib/postgresql/data
      - ./docker/calcom-init:/docker-entrypoint-initdb.d:ro
    ports:
      # Published for scripts/calcom_sim.py (writes fixture Booking/Attendee rows from the host).
      - "127.0.0.1:${PG_CALCOM_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_CALCOM_USER:-calcom} -d ${PG_CALCOM_DB:-calcom}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # WireMock stand-ins for the external HTTP APIs (UniSender Go, Telegram Bot
  # API, GetStream) under path prefixes /unisender, /telegram, /getstream.
  # Request journal: http://localhost:8089/__admin/requests
  # (the former /shortify stub is replaced by the real event-shortener service.)
  mocks:
    image: wiremock/wiremock:3.13.1
    command: ["--global-response-templating", "--disable-banner"]
    volumes:
      - ./docker/mocks/mappings:/home/wiremock/mappings:ro
    ports:
      - "127.0.0.1:${MOCKS_PORT:-8089}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Observability: Prometheus + Grafana + exporters
  # (design: docs/superpowers/specs/2026-06-13-prometheus-grafana-metrics-design.md)
  # --------------------------------------------------------------------------
  # One postgres_exporter per DB — simplest multi-DB coverage; each is scraped
  # by prometheus in-network on :9187 (no host ports).
  pg-exporter-saver:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: postgresql://${PG_SAVER_USER:-postgres}:${PG_SAVER_PASSWORD:-postgres}@pg-saver:5432/${PG_SAVER_DB:-event_saver}?sslmode=disable
    depends_on:
      pg-saver:
        condition: service_healthy
    restart: unless-stopped

  pg-exporter-users:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: postgresql://${PG_USERS_USER:-postgres}:${PG_USERS_PASSWORD:-postgres}@pg-users:5432/${PG_USERS_DB:-event_users}?sslmode=disable
    depends_on:
      pg-users:
        condition: service_healthy
    restart: unless-stopped

  pg-exporter-notifier:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: postgresql://${PG_NOTIFIER_USER:-postgres}:${PG_NOTIFIER_PASSWORD:-postgres}@pg-notifier:5432/${PG_NOTIFIER_DB:-event_notifier}?sslmode=disable
    depends_on:
      pg-notifier:
        condition: service_healthy
    restart: unless-stopped

  pg-exporter-calcom:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: postgresql://${PG_CALCOM_USER:-calcom}:${PG_CALCOM_PASSWORD:-calcom}@pg-calcom:5432/${PG_CALCOM_DB:-calcom}?sslmode=disable
    depends_on:
      pg-calcom:
        condition: service_healthy
    restart: unless-stopped

  pg-exporter-shortener:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: postgresql://${PG_SHORTENER_USER:-postgres}:${PG_SHORTENER_PASSWORD:-postgres}@pg-shortener:5432/${PG_SHORTENER_DB:-event_shortener}?sslmode=disable
    depends_on:
      pg-shortener:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: ["observability"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      # 127.0.0.1, not localhost: prometheus listens on 0.0.0.0 (IPv4) and
      # busybox wget resolves localhost to ::1 without falling back.
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.3
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # VictoriaLogs datasource plugin (provisioned in datasources/victorialogs.yml).
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      # Datasource (uid `prometheus`) + the two dashboards are provisioned
      # from the repo — no clicking required after `docker compose up`.
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.0
    profiles: ["observability"]
    # The image does no env interpolation in its YAML, so entrypoint.sh renders
    # alertmanager.tmpl.yml -> /tmp/alertmanager.yml (sed substitution of the
    # ops Telegram token/chat + Grafana port) then execs alertmanager.
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    environment:
      # Empty/placeholder values => graceful degrade: AM loads and stays up,
      # failed Telegram sends only appear in its log. Set both in .env for
      # real delivery.
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
      GRAFANA_PORT: ${GRAFANA_PORT:-3001}
    volumes:
      - ./docker/alertmanager/alertmanager.tmpl.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
      - ./docker/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager-data:/alertmanager
    ports:
      # Loopback-only, same as Prometheus/Grafana ops endpoints.
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Logging: Vector (collector) -> VictoriaLogs (storage), queried in Grafana.
  # (design: docs/superpowers/specs/2026-06-13-log-aggregation-vector-victorialogs-design.md)
  # --------------------------------------------------------------------------
  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    profiles: ["observability"]
    command:
      - "-retentionPeriod=${LOGS_RETENTION_PERIOD:-7d}"
      - "-storageDataPath=/victoria-logs-data"
    volumes:
      - victorialogs-data:/victoria-logs-data
    ports:
      # Loopback-only: built-in UI + LogsQL API (/select/logsql/query) on :9428.
      - "127.0.0.1:${VICTORIALOGS_PORT:-9428}:9428"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Vector tails every container's stdout via the Docker socket (read-only),
  # parses structlog JSON, and ships to VictoriaLogs. No app changes needed.
  vector:
    image: timberio/vector:0.56.0-alpine
    profiles: ["observability"]
    volumes:
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      victorialogs:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Distributed tracing: Grafana Tempo (storage) + OTel Collector (ingest).
  # (design: docs/superpowers/plans/2026-06-14-distributed-tracing-opentelemetry.md)
  # Tracing is OFF by default (OTEL_SDK_DISABLED=true); enable via the
  # observability profile and set OTEL_SDK_DISABLED=false.
  # --------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    profiles: ["observability"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3200/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otelcol/config.yaml"]
    profiles: ["observability"]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:${OTEL_COLLECTOR_PORT:-4317}:4317"
    depends_on:
      tempo:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Vault (secret-flow testing only — OFF by default, `vault` profile).
  # Dev mode (in-memory, auto-unsealed, root token below). This is ONLY for
  # exercising the Kubernetes ExternalSecrets flow locally (seed-vault.sh against
  # KV-v2 at secret/events/<service>); normal local dev does NOT depend on it.
  #   docker compose --profile vault up -d vault
  #   VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN=$VAULT_DEV_ROOT_TOKEN_ID \
  #     deploy/scripts/seed-vault.sh
  # --------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.20.1
    profiles: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: ["server", "-dev"]
    ports:
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Services
  # --------------------------------------------------------------------------
  event-receiver:
    build:
      context: ./event-receiver
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-receiver
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      CORS_ORIGINS: http://localhost:${ADMIN_FRONTEND_PORT:-3000},http://localhost:${JITSI_CHAT_PORT:-8080}
      # Jitsi webhook JWTs are minted by event-booking — keys/claims must match.
      AUTHORIZATION_JWT_VERIFY_KEY: ${JITSI_JWT_SECRET:-dev-jitsi-jwt-5b8e2d9c4f7a1360}
      AUTHORIZATION_JWT_ALGORITHM: HS256
      AUTHORIZATION_JWT_ISSUER: ${JITSI_JWT_ISS:-event-booking}
      AUTHORIZATION_JWT_AUDIENCE: ${JITSI_JWT_AUD:-jitsi}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-dev-unisender-webhook-5c1f8e3b7a92d460}
      GETSTREAM_API_KEY: ${CHAT_API_KEY:-devgetstreamkey0123456789}
      GETSTREAM_API_SECRET: ${CHAT_API_SECRET:-devgetstreamapisecret0123456789}
      GETSTREAM_USER_ID_ENCRYPTION_KEY: ${CHAT_USER_ID_ENCRYPTION_KEY:-devchatencryption6b2e9d4c8f1a7350}
      BOOKING_API_KEY: ${BOOKING_API_KEY:-dev-booking-api-key-7f3a9c1e24b85d60}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-api-key-4e8b2f6a91c73d50}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:-dev-calcom-webhook-9d2c4f7a1e6b8350}
      EVENT_USERS_API_URL: http://event-users:8888
      EVENT_USERS_API_TOKEN: ${USERS_API_BEARER_TOKEN:-dev-users-bearer-2a7d9e4f8c1b6350}
    ports:
      - "${RECEIVER_PORT:-8888}:8888"
    depends_on:
      rabbitmq:
        condition: service_healthy
      event-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  event-saver:
    build:
      context: ./event-saver
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-saver
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      POSTGRES_DSN: postgresql+asyncpg://${PG_SAVER_USER:-postgres}:${PG_SAVER_PASSWORD:-postgres}@pg-saver:5432/${PG_SAVER_DB:-event_saver}
    depends_on:
      rabbitmq:
        condition: service_healthy
      pg-saver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  event-booking:
    build:
      context: ./event-booking
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-booking
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      # Override CALCOM_DATABASE_URL in .env to use an external cal.com DB.
      CALCOM_POSTGRES_DSN: ${CALCOM_DATABASE_URL:-postgresql+asyncpg://calcom:calcom@pg-calcom:5432/calcom}
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      EVENTS_ENDPOINT_URL: http://event-receiver:8888/event/booking
      EVENTS_API_KEY: ${BOOKING_API_KEY:-dev-booking-api-key-7f3a9c1e24b85d60}
      JITSI_JWT_SECRET: ${JITSI_JWT_SECRET:-dev-jitsi-jwt-5b8e2d9c4f7a1360}
      JITSI_JWT_AUD: ${JITSI_JWT_AUD:-jitsi}
      JITSI_JWT_ISS: ${JITSI_JWT_ISS:-event-booking}
      JITSI_JWT_SUB: ${JITSI_JWT_SUB:-meet.jit.si}
      MEETING_HOST_URL: ${MEETING_HOST_URL:-http://localhost:${JITSI_CHAT_PORT:-8080}}
      CHAT_API_KEY: ${CHAT_API_KEY:-devgetstreamkey0123456789}
      CHAT_API_SECRET: ${CHAT_API_SECRET:-devgetstreamapisecret0123456789}
      CHAT_USER_ID_ENCRYPTION_KEY: ${CHAT_USER_ID_ENCRYPTION_KEY:-devchatencryption6b2e9d4c8f1a7350}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-http://mocks:8080/getstream}
      SHORTENER_URL: ${SHORTENER_URL:-http://event-shortener:8888}
      SHORTENER_API_KEY: ${SHORTENER_API_KEY:-dev-shortify-api-key-8c4e1f7b2a93d650}
      IS_ENABLE_BOOKING_CONSTRAINTS: ${IS_ENABLE_BOOKING_CONSTRAINTS:-false}
      # Booking blacklist (read from event-admin; fail-open, so no hard depends_on).
      BLACKLIST_ENABLED: ${BLACKLIST_ENABLED:-true}
      EVENT_ADMIN_API_URL: http://event-admin:8888
      BLACKLIST_SERVICE_TOKEN: ${BLACKLIST_SERVICE_TOKEN:-dev-blacklist-service-9d4f2c7b1e8a6350}
      BLACKLIST_CACHE_TTL: ${BLACKLIST_CACHE_TTL:-300}
    depends_on:
      rabbitmq:
        condition: service_healthy
      pg-calcom:
        condition: service_healthy
      event-receiver:
        condition: service_healthy
      mocks:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  event-users:
    build:
      context: ./event-users
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-users
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      POSTGRES_DSN: postgresql+asyncpg://${PG_USERS_USER:-postgres}:${PG_USERS_PASSWORD:-postgres}@pg-users:5432/${PG_USERS_DB:-event_users}
      JWT_SECRET_KEY: ${ADMIN_JWT_SECRET:-dev-admin-jwt-8f2c6a1d9e4b7350a3c5d7e9}
      API_BEARER_TOKEN: ${USERS_API_BEARER_TOKEN:-dev-users-bearer-2a7d9e4f8c1b6350}
      CORS_ORIGINS: '["http://localhost:${ADMIN_FRONTEND_PORT:-3000}"]'
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      IS_CONSUMER_ENABLED: "true"
      # CRM sync/webhook stay off in the local stack (no CRM mock by design).
      IS_SYNC_ENABLED: "false"
      IS_WEBHOOK_ENABLED: "false"
      CRM_API_URL: ${CRM_API_URL:-http://mocks:8080/crm}
      CRM_API_TOKEN: ${CRM_API_TOKEN:-dev-crm-api-token-1c7e4f9b2a83d650}
      CRM_ENCRYPTION_KEY: ${CRM_ENCRYPTION_KEY:-9f1e8d7c6b5a49382716059483726150aabbccddeeff00112233445566778899}
      EVENT_ADMIN_URL: http://event-admin:8888
      EVENT_ADMIN_CACHE_TOKEN: ${CACHE_INVALIDATION_TOKEN:-dev-cache-invalidation-3e9f1c7b4a82d650}
    ports:
      - "${USERS_PORT:-8001}:8888"
    depends_on:
      rabbitmq:
        condition: service_healthy
      pg-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  event-admin:
    build:
      context: ./event-admin
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-admin
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      # Read-only view over event-saver's database (+ its own admin_users table).
      POSTGRES_DSN: postgresql+asyncpg://${PG_SAVER_USER:-postgres}:${PG_SAVER_PASSWORD:-postgres}@pg-saver:5432/${PG_SAVER_DB:-event_saver}
      JWT_SECRET_KEY: ${ADMIN_JWT_SECRET:-dev-admin-jwt-8f2c6a1d9e4b7350a3c5d7e9}
      CORS_ORIGINS: '["http://localhost:${ADMIN_FRONTEND_PORT:-3000}"]'
      USERS_SERVICE_URL: http://event-users:8888
      USERS_SERVICE_API_TOKEN: ${USERS_API_BEARER_TOKEN:-dev-users-bearer-2a7d9e4f8c1b6350}
      CACHE_INVALIDATION_TOKEN: ${CACHE_INVALIDATION_TOKEN:-dev-cache-invalidation-3e9f1c7b4a82d650}
      EVENT_RECEIVER_URL: http://event-receiver:8888
      EVENT_RECEIVER_API_KEY: ${ADMIN_API_KEY:-dev-admin-api-key-4e8b2f6a91c73d50}
      # Static token for GET /api/blacklist/active (must match event-booking).
      BLACKLIST_SERVICE_TOKEN: ${BLACKLIST_SERVICE_TOKEN:-dev-blacklist-service-9d4f2c7b1e8a6350}
      # Notifier admin API proxy (must match NOTIFIER_ADMIN_TOKEN in event-notifier).
      NOTIFIER_SERVICE_URL: http://event-notifier:8888
      NOTIFIER_ADMIN_TOKEN: ${NOTIFIER_ADMIN_TOKEN:-dev-notifier-admin-7c2f9e4b1a83d650}
      # Shortener stats API (must match event-shortener SHORTENER_API_KEY).
      SHORTENER_URL: ${SHORTENER_URL:-http://event-shortener:8888}
      SHORTENER_API_KEY: ${SHORTENER_API_KEY:-dev-shortify-api-key-8c4e1f7b2a93d650}
    ports:
      - "${ADMIN_PORT:-8002}:8888"
    depends_on:
      pg-saver:
        condition: service_healthy
      event-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  event-notifier:
    build:
      context: ./event-notifier
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-notifier
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://${PG_NOTIFIER_USER:-postgres}:${PG_NOTIFIER_PASSWORD:-postgres}@pg-notifier:5432/${PG_NOTIFIER_DB:-event_notifier}
      EVENT_USERS_URL: http://event-users:8888
      EVENT_USERS_TOKEN: ${USERS_API_BEARER_TOKEN:-dev-users-bearer-2a7d9e4f8c1b6350}
      EVENTS_ENDPOINT_URL: http://event-receiver:8888/event/admin
      EVENTS_API_KEY: ${ADMIN_API_KEY:-dev-admin-api-key-4e8b2f6a91c73d50}
      DEFAULT_LOCALE: ru
      UNISENDER_BASE_URL: ${UNISENDER_BASE_URL:-http://mocks:8080/unisender}
      UNISENDER_API_KEY: ${UNISENDER_API_KEY:-dev-unisender-api-key-6e2c9f4b8a13d750}
      UNISENDER_FROM_EMAIL: ${UNISENDER_FROM_EMAIL:-noreply@dev.local}
      UNISENDER_FROM_NAME: ${UNISENDER_FROM_NAME:-Events Dev}
      # Literal because compose ${VAR:-default} cannot contain '}'. Real template
      # UUIDs go in a docker-compose.override.yml (see .env.example notes).
      UNISENDER_TEMPLATE_IDS: '{"ru":{"BOOKING_CREATED":"00000000-0000-4000-8000-000000000001","BOOKING_CANCELLED":"00000000-0000-4000-8000-000000000002","BOOKING_RESCHEDULED":"00000000-0000-4000-8000-000000000003","BOOKING_REASSIGNED":"00000000-0000-4000-8000-000000000004","BOOKING_REMINDER":"00000000-0000-4000-8000-000000000005","BOOKING_REJECTED":"00000000-0000-4000-8000-000000000006","BOOKING_REJECTED_BLACKLISTED":"00000000-0000-4000-8000-000000000007"},"en":{"BOOKING_REJECTED_BLACKLISTED":"00000000-0000-4000-8000-000000000008"}}'
      TELEGRAM_BASE_URL: ${TELEGRAM_BASE_URL:-http://mocks:8080/telegram}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-0000000000:dev-telegram-bot-token-mock}
      # Admin API token (must match NOTIFIER_ADMIN_TOKEN in event-admin).
      NOTIFIER_ADMIN_TOKEN: ${NOTIFIER_ADMIN_TOKEN:-dev-notifier-admin-7c2f9e4b1a83d650}
      BINDINGS_CACHE_TTL_SECONDS: ${BINDINGS_CACHE_TTL_SECONDS:-30}
    depends_on:
      rabbitmq:
        condition: service_healthy
      pg-notifier:
        condition: service_healthy
      event-users:
        condition: service_healthy
      mocks:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Trigger-driven DB sync: a cal.com NOTIFY hook + watermark reconcile emit
  # user.upserted CloudEvents (routing key events.user.email) consumed by
  # event-users. Owns its own pg-db-sync (sync_state) DB and runs `alembic
  # upgrade head` in its entrypoint. Reads the cal.com fixture DB read-only
  # (the NOTIFY trigger is an additive, sanctioned hook — not a schema migration).
  event-db-sync:
    build:
      context: ./event-db-sync
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-db-sync
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      RABBIT_URL: amqp://${RABBITMQ_USER:-events}:${RABBITMQ_PASSWORD:-dev-rabbit-password-01}@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://${PG_DB_SYNC_USER:-postgres}:${PG_DB_SYNC_PASSWORD:-postgres}@pg-db-sync:5432/${PG_DB_SYNC_DB:-event_db_sync}
      # Plain postgresql:// (NOT +asyncpg) — raw LISTEN/SELECT against the cal.com fixture DB.
      CALCOM_DATABASE_URL: postgresql://${PG_CALCOM_USER:-calcom}:${PG_CALCOM_PASSWORD:-calcom}@pg-calcom:5432/${PG_CALCOM_DB:-calcom}
      # Static bearer token gating POST /admin/full-sync.
      SYNC_ADMIN_TOKEN: ${SYNC_ADMIN_TOKEN:-dev-sync-admin-token}
    ports:
      - "${DB_SYNC_PORT:-8003}:8888"
    depends_on:
      rabbitmq:
        condition: service_healthy
      pg-db-sync:
        condition: service_healthy
      pg-calcom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # URL shortener (REST). Replaces the former /shortify WireMock stub; event-
  # booking calls it to shorten meeting links. Owns its own pg-shortener DB and
  # runs `alembic upgrade head` in its entrypoint.
  event-shortener:
    build:
      context: ./event-shortener
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: event-shortener
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_always_on}
      POSTGRES_DSN: postgresql+asyncpg://${PG_SHORTENER_USER:-postgres}:${PG_SHORTENER_PASSWORD:-postgres}@pg-shortener:5432/${PG_SHORTENER_DB:-event_shortener}
      # Static bearer key event-booking sends on /api/v1/* — must match booking's SHORTENER_API_KEY.
      SHORTENER_API_KEY: ${SHORTENER_API_KEY:-dev-shortify-api-key-8c4e1f7b2a93d650}
    ports:
      - "${SHORTENER_PORT:-8000}:8888"
    depends_on:
      pg-shortener:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  event-admin-frontend:
    build:
      context: ./event-admin-frontend
      dockerfile: Dockerfile
      args:
        # Empty = same-origin: nginx inside the container proxies
        # /api, /auth, /bookings and /health to event-admin:8888.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${ADMIN_FRONTEND_PORT:-3000}:80"
    depends_on:
      event-admin:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: nginx only listens on IPv4 and busybox
      # wget resolves localhost to ::1 without falling back.
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  jitsi-chat:
    build:
      context: ./jitsi-chat
      dockerfile: Dockerfile
    environment:
      # Injected at container start by env.sh (runtime, not build time).
      VITE_JITSI_DOMAIN: ${VITE_JITSI_DOMAIN:-meet.jit.si}
      VITE_WEBHOOK_URL: ${VITE_WEBHOOK_URL:-http://localhost:${RECEIVER_PORT:-8888}/event/jitsi}
      VITE_STREAM_CHAT_API_KEY: ${CHAT_API_KEY:-devgetstreamkey0123456789}
      # Browser-side: cannot reach the in-network mock, so the real endpoint is
      # the default (chat simply stays disconnected with dev credentials).
      VITE_STREAM_CHAT_BASE_URL: ${VITE_STREAM_CHAT_BASE_URL:-https://chat.stream-io-api.com}
    ports:
      - "${JITSI_CHAT_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pg-data:
  pg-calcom-data:
  prometheus-data:
  alertmanager-data:
  victorialogs-data:
  tempo-data:
