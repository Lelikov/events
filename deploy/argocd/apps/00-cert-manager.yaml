# cert-manager — sync-wave 0 (must exist before ingress TLS / ClusterIssuers).
# Installed straight from the upstream OCI chart; CRDs installed in-chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: upstream chart + values from THIS repo, so the overlay is the
  # single source of truth (deploy/helm/prereqs/cert-manager-values.yaml) instead
  # of a hand-synced inline copy.
  sources:
    - repoURL: oci://quay.io/jetstack/charts/cert-manager
      chart: cert-manager
      targetRevision: v1.19.5
      helm:
        valueFiles:
          - $values/deploy/helm/prereqs/cert-manager-values.yaml
    - repoURL: https://github.com/lelikov/events # TODO: same repoURL as app-of-apps.yaml
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # large cert-manager CRDs need SSA
