# External Secrets Operator — sync-wave 2 (after Vault; its CRDs back every
# service ExternalSecret, and its ClusterSecretStore needs Vault reachable).
#
# Pinned to the 0.10.x line: it serves external-secrets.io/v1beta1, the API the
# platform charts render. ESO 2.x promotes those CRDs to v1 / removes v1beta1.
#
# The "vault-backend" ClusterSecretStore (deploy/helm/prereqs/manifests/
# cluster-secret-store.yaml) is applied by the operator AFTER Vault is
# bootstrapped — it is intentionally NOT managed here so a not-yet-unsealed
# Vault never blocks the ESO sync. See README.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: upstream chart + values from THIS repo
  # (deploy/helm/prereqs/eso-values.yaml — installCRDs: true).
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.10.7
      helm:
        valueFiles:
          - $values/deploy/helm/prereqs/eso-values.yaml
    - repoURL: https://github.com/lelikov/events # TODO: same repoURL as app-of-apps.yaml
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # ESO CRDs are large; SSA avoids the annotation limit
