# ingress-nginx — sync-wave 1 (after cert-manager; before the platform
# ingresses + ACME http01 solver pods can resolve).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    # Reuses the same overlay the phase-2 prereqs/ uses. Inline here so ArgoCD
    # does not need a second source; keep in sync with
    # deploy/helm/prereqs/ingress-nginx-values.yaml.
    helm:
      values: |
        controller:
          ingressClassResource:
            default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
