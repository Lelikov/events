# ingress-nginx — sync-wave 1 (after cert-manager; before the platform
# ingresses + ACME http01 solver pods can resolve).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Multi-source: upstream chart + the full overlay from THIS repo
  # (deploy/helm/prereqs/ingress-nginx-values.yaml) — carries the Beget external-LB
  # annotations, externalTrafficPolicy, proxy-body-size, and the PDB maxUnavailable
  # fix. No more hand-synced inline copy that silently drifts.
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.15.1
      helm:
        valueFiles:
          - $values/deploy/helm/prereqs/ingress-nginx-values.yaml
    - repoURL: https://github.com/lelikov/events # TODO: same repoURL as app-of-apps.yaml
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
