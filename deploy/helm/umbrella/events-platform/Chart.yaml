apiVersion: v2
name: events-platform
description: >-
  Umbrella chart deploying all 9 events-platform services. Per-subchart
  overrides (image.tag, ingress.host, replicas, hpa) live in the
  values-{prod,staging,kind}.yaml files. Secrets/config come from Vault via
  External Secrets Operator (phase 2).
type: application
version: 0.1.0
appVersion: "latest"
dependencies:
  - name: event-receiver
    version: 0.1.0
    repository: "file://../../charts/event-receiver"
  - name: event-saver
    version: 0.1.0
    repository: "file://../../charts/event-saver"
  - name: event-booking
    version: 0.1.0
    repository: "file://../../charts/event-booking"
  - name: event-admin
    version: 0.1.0
    repository: "file://../../charts/event-admin"
  - name: event-admin-frontend
    version: 0.1.0
    repository: "file://../../charts/event-admin-frontend"
  - name: event-users
    version: 0.1.0
    repository: "file://../../charts/event-users"
  - name: event-notifier
    version: 0.1.0
    repository: "file://../../charts/event-notifier"
  - name: event-shortener
    version: 0.1.0
    repository: "file://../../charts/event-shortener"
  - name: jitsi-chat
    version: 0.1.0
    repository: "file://../../charts/jitsi-chat"
  # --- devDependencies (kind smoke / local clusters only) -------------------
  # In PROD these are EXTERNAL/managed (charts consume DSN/URL from Vault and
  # never create databases). For a real in-cluster smoke we need Postgres +
  # RabbitMQ, gated behind devDependencies.* so prod renders nothing extra.
  - name: postgresql
    alias: devpostgresql
    version: "15.5.38"
    repository: "https://charts.bitnami.com/bitnami"
    condition: devDependencies.postgresql.enabled
  - name: rabbitmq
    alias: devrabbitmq
    version: "14.7.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: devDependencies.rabbitmq.enabled
