# Pull the private ghcr.io/lelikov/* images using the ESO-materialized ghcr-pull secret.
ghcrPullSecret:
  enabled: true
global:
  imagePullSecrets:
    - name: ghcr-pull

# events-platform — PRODUCTION overlay.
#
# Image tags are written by CI (image bump PR -> ArgoCD sync), so they start
# as placeholders. Hostnames are TODO placeholders to be replaced with real
# production DNS. Replicas 2, HPA enabled for public/throughput services.

# In-cluster Postgres/RabbitMQ are NEVER deployed in prod — managed/external.
devDependencies:
  postgresql:
    enabled: false
  rabbitmq:
    enabled: false

event-receiver:
  replicas: 2
  image:
    tag: TODO-set-by-ci
  ingress:
    enabled: true
    host: TODO-receiver.prod.example.com # TODO: real production host
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

