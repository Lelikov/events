# Pull the private ghcr.io/lelikov/* images using the ESO-materialized ghcr-pull secret.
ghcrPullSecret:
  enabled: true
global:
  imagePullSecrets:
    - name: ghcr-pull

# events-platform — PRODUCTION overlay.
#
# Image tags are written by CI (image bump PR -> ArgoCD sync), so they start
# as placeholders. Hostnames are TODO placeholders to be replaced with real
# production DNS. Replicas 2, HPA enabled for public/throughput services.
#
# Target cluster (Beget Managed K8s), sized for this overlay:
#   - control plane: 1 managed master (HA 3-master optional)
#   - workers: 2 x (4 vCPU / 8 GB / 80 GB NVMe)  ->  8 vCPU / 16 GB total
#   Baseline app requests ~1.8 vCPU / 2.3 GB (9 svc x HPA min 2 x 100m/128Mi);
#   the rest covers ingress-nginx/cert-manager/ESO + HPA scale-up (x5) and the
#   loss of one node. Add a 3rd worker + HA control plane for full HA.
#
# Stateful pieces live OUTSIDE the cluster:
#   - PostgreSQL: Beget Managed PostgreSQL (5 DBs) — DSNs in Vault.
#   - RabbitMQ:   self-managed on a VPS (Beget has no managed RabbitMQ); the
#     AMQP URL lives in Vault (RABBIT_URL, deploy/scripts/seed-vault.sh).
#
# In-cluster Postgres/RabbitMQ are NEVER deployed in prod — managed/external.
devDependencies:
  postgresql:
    enabled: false
  rabbitmq:
    enabled: false

event-receiver:
  replicas: 2
  image:
    tag: TODO-set-by-ci
  ingress:
    enabled: true
    host: TODO-receiver.prod.example.com # TODO: real production host
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

