# events-platform — KIND overlay (CI smoke / local cluster).
#
# Single replica everywhere. Ingress hosts use the *.127.0.0.1.nip.io wildcard
# so they resolve to localhost without DNS.
#
# externalSecret stays ENABLED so the rendered manifests match prod, but it
# REQUIRES the phase-2 prereqs (ESO + a "vault-backend" ClusterSecretStore
# seeded from Vault). Before deploying this overlay:
#   1. Install prereqs + apply ClusterSecretStore/ClusterIssuers:
#        deploy/helm/prereqs/README.md  (cert-manager -> ingress-nginx -> vault -> ESO)
#   2. Seed Vault from the repo's dev defaults:
#        VAULT_ADDR=... VAULT_TOKEN=... deploy/scripts/seed-vault.sh
#      -> writes secret/events/<service>, resolved as secret/data/events/<service>.
# Only then do the pods become Ready (envFrom references the ESO-managed secret).
#
# cert-manager is not assumed in a bare kind cluster, so the cluster-issuer
# annotation is cleared and TLS is disabled on the ingresses below.

# devDependencies: a single in-cluster Postgres (with an initdb script that
# creates the 4 logical DBs + roles) and a single RabbitMQ. These exist ONLY
# for the kind smoke; prod keeps them off and uses managed instances. The
# smoke's seed-vault step points every service's DSN/RABBIT_URL at these
# (release name "events-platform", alias case preserved):
#   Postgres host: events-platform-devPostgresql.<ns>.svc:5432 (postgres/postgres)
#   RabbitMQ host: events-platform-devRabbitmq.<ns>.svc:5672   (guest/guest)
# (the smoke passes those via PG_*_HOST / RABBIT_* env to seed-vault.sh).
devDependencies:
  postgresql:
    enabled: true
  rabbitmq:
    enabled: true

# Bitnami postgresql subchart (alias devPostgresql). Lightweight standalone
# instance; initdb script provisions event_saver/event_users/event_notifier/
# event_shortener databases (one shared "postgres" superuser for the smoke).
devPostgresql:
  auth:
    postgresPassword: postgres
    username: postgres
    password: postgres
    database: postgres
  primary:
    persistence:
      enabled: false
    resourcesPreset: "none"
    initdb:
      scripts:
        00-create-databases.sql: |
          CREATE DATABASE event_saver;
          CREATE DATABASE event_users;
          CREATE DATABASE event_notifier;
          CREATE DATABASE event_shortener;
          CREATE DATABASE calcom;

# Bitnami rabbitmq subchart (alias devRabbitmq). Single node, no persistence.
devRabbitmq:
  auth:
    username: guest
    password: guest
  persistence:
    enabled: false
  resourcesPreset: "none"
  clustering:
    enabled: false
  replicaCount: 1

event-receiver:
  replicas: 1
  image:
    tag: latest
  ingress:
    enabled: true
    host: receiver.127.0.0.1.nip.io
    clusterIssuer: ""
    tls:
      enabled: false

# DB-owning services: the migration Helm hook (pre-install, weight -5) runs
# BEFORE the in-cluster Postgres devDependency and the ESO-managed env Secret
# exist, so it cannot succeed in a from-scratch kind cluster and would block
# `helm install` until timeout. Disable it here (kind only). The receiver-202
# smoke path does not depend on these services' schemas; prod keeps migrations on.
event-saver:
  replicas: 1
  image:
    tag: latest
  migration:
    enabled: false

event-booking:
  replicas: 1
  image:
    tag: latest

event-admin:
  replicas: 1
  image:
    tag: latest
  ingress:
    enabled: true
    host: admin-api.127.0.0.1.nip.io
    clusterIssuer: ""
    tls:
      enabled: false

event-admin-frontend:
  replicas: 1
  image:
    tag: latest
  ingress:
    enabled: true
    host: admin.127.0.0.1.nip.io
    clusterIssuer: ""
    tls:
      enabled: false

event-users:
  replicas: 1
  image:
    tag: latest
  migration:
    enabled: false

event-notifier:
  replicas: 1
  image:
    tag: latest
  migration:
    enabled: false

event-shortener:
  replicas: 1
  image:
    tag: latest
  migration:
    enabled: false
  ingress:
    enabled: true
    host: s.127.0.0.1.nip.io
    clusterIssuer: ""
    tls:
      enabled: false

jitsi-chat:
  replicas: 1
  image:
    tag: latest
  ingress:
    enabled: true
    host: meet.127.0.0.1.nip.io
    clusterIssuer: ""
    tls:
      enabled: false
