# events-platform umbrella — base defaults.
#
# Each top-level key matches a subchart name and overrides that subchart's
# values.yaml. Only k8s spec is set here (image tags, hosts, replicas, hpa);
# all app config + secrets come from Vault via ESO.
#
# Environment overlays: values-prod.yaml, values-staging.yaml, values-kind.yaml.

event-receiver:
  replicas: 1
  image:
    tag: latest

