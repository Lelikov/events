apiVersion: v2
name: events-observability
description: >-
  Observability umbrella for the events platform on Kubernetes: metrics
  (kube-prometheus-stack: Prometheus Operator + Grafana + Alertmanager), logs
  (VictoriaLogs single + a Vector DaemonSet shipping pod logs), and the migrated
  docker-compose assets — 3 Grafana dashboards, PrometheusRule alert rules, a
  ServiceMonitor scraping the 7 metrics-exposing services, and Telegram
  Alertmanager routing. Deployed separately from events-platform.
type: application
version: 0.1.0
appVersion: "latest"

# OCI repositories used on purpose: the prometheus-community / victoriametrics /
# vector http chart indexes throttle aggressively, and `helm dependency build`
# pulls cleanly from their ghcr mirrors. Pinned to the current releases verified
# 2026-06-14.
dependencies:
  # Prometheus Operator + Prometheus + Grafana + Alertmanager + node-exporter +
  # kube-state-metrics. The ServiceMonitor/PrometheusRule CRDs it installs are
  # what our migrated scrape config and alert rules render against.
  - name: kube-prometheus-stack
    version: 86.2.3
    repository: oci://ghcr.io/prometheus-community/charts
  # VictoriaLogs server (logs store + query). Its bundled vector subchart is
  # left disabled — we run our own Vector DaemonSet so the structlog VRL
  # transform from docker/vector/vector.yaml carries over verbatim.
  - name: victoria-logs-single
    version: 0.13.7
    repository: oci://ghcr.io/victoriametrics/helm-charts
  # Vector as a DaemonSet (role: Agent) using the kubernetes_logs source
  # (replacing docker_logs) and shipping to VictoriaLogs' ES bulk endpoint.
  - name: vector
    version: 0.56.0
    repository: oci://ghcr.io/vectordotdev/helm-charts
