{{/*
ExternalSecret for Alertmanager's Telegram BOT TOKEN. Same pattern as every
platform service (phase 2): ESO maps a Vault path -> a k8s Secret; the token is
never inlined in values. The Vault path secret/data/events/alertmanager must hold
  bot-token -> Telegram bot token (ALERT_TELEGRAM_BOT_TOKEN)

The kube-prometheus-stack Alertmanager mounts this Secret (alertmanagerSpec.secrets
in values.yaml) at /etc/alertmanager/secrets/<secretName>/bot-token and reads it via
the telegram_configs `bot_token_file` field. chat_id has no `_file` variant in
Alertmanager and is a non-credential destination id, so it stays values-driven
(alertmanagerTelegram.chatId) and is templated into the config inline.
*/}}
{{- if .Values.alertmanagerTelegram.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.alertmanagerTelegram.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "events-observability.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.alertmanagerTelegram.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: {{ .Values.alertmanagerTelegram.externalSecret.storeKind | default "ClusterSecretStore" }}
    name: {{ .Values.alertmanagerTelegram.externalSecret.storeName | default "vault-backend" }}
  target:
    name: {{ .Values.alertmanagerTelegram.secretName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.alertmanagerTelegram.externalSecret.vaultPath | quote }}
{{- end }}
