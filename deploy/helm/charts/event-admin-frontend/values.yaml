# Values for event-admin-frontend. Only k8s spec lives here — NEVER app config or secrets.
# All runtime env (secret and non-secret) comes from Vault via ESO (phase 2).

nameOverride: ""
fullnameOverride: "event-admin-frontend"

replicas: 1

image:
  repository: ghcr.io/lelikov/event-admin-frontend
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 80

# Optional command/args override for the Deployment (e.g. bypass entrypoint
# migration on DB-owning services so replicas don't migrate concurrently).
command: []
args: []

probes:
  liveness: /health
  readiness: /health
  initialDelaySeconds: 5
  periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ExternalSecret: maps Vault path -> k8s Secret consumed via envFrom.
# Target secret name is "<fullname>-env" (set by the library).
externalSecret:
  enabled: true
  refreshInterval: 1h
  storeKind: ClusterSecretStore
  storeName: vault-backend
  vaultPath: secret/data/events/event-admin-frontend

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-prod
  host: admin.example.com
  path: /
  pathType: Prefix
  annotations: {}
  tls:
    enabled: true
    secretName: ""

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

migration:
  enabled: false
  backoffLimit: 3

podAnnotations: {}
readOnlyRootFilesystem: false

# nginx official image runs its master process as root, binds :80, and its
# entrypoint chowns the cache dirs (/var/cache/nginx/*) to the worker uid 101
# before dropping privileges to the worker. The library securityContext drops
# ALL capabilities, which strips both NET_BIND_SERVICE (can't bind :80) and
# CHOWN/SETUID/SETGID (can't chown the cache or drop to the worker uid -> the
# entrypoint dies with chown "Operation not permitted"). Add exactly those caps
# back and do NOT force runAsNonRoot. seccompProfile stays RuntimeDefault.
capabilitiesAdd:
  - NET_BIND_SERVICE
  - CHOWN
  - SETUID
  - SETGID
  - DAC_OVERRIDE

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
