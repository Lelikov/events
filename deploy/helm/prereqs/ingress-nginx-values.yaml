# ingress-nginx controller (ingress-nginx/ingress-nginx chart).
#
# Pinned chart: ingress-nginx/ingress-nginx 4.15.1 (appVersion controller 1.15.1).
#
# Cloud-agnostic: a LoadBalancer Service (works on any cloud's LB; on bare-metal
# pair with MetalLB, on kind use the NodePort overlay noted below). cert-manager
# solves ACME http01 challenges through this controller (see ClusterIssuer).

controller:
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  # Make this controller the cluster default so Ingresses without an explicit
  # className still route here.
  ingressClass: nginx

  replicaCount: 2

  # Beget's cluster enforces a ValidatingAdmissionPolicy `pdb-sane-limits` that
  # REJECTS a PodDisruptionBudget with minAvailable=1 (it can block node drain for
  # near-singleton workloads). This chart auto-creates a PDB when replicaCount > 1
  # and defaults to minAvailable: 1 — which fails the policy and aborts the install
  # (cascading into a broken admission webhook). Setting maxUnavailable flips the
  # PDB to `maxUnavailable: 1` (policy-allowed) while still keeping >=1 controller
  # up during voluntary disruptions. (Chart key is controller.maxUnavailable, NOT
  # controller.podDisruptionBudget.*.)
  maxUnavailable: 1

  service:
    type: LoadBalancer
    # externalTrafficPolicy Local preserves the client source IP (useful for
    # webhook allow-lists on event-receiver).
    externalTrafficPolicy: Local
    # Beget Managed K8s LoadBalancer: `external` = public IP (the cluster's
    # single public entrypoint; all service Ingresses route through here).
    # `internal` would instead bind a private-network (10.16.0.0/16) IP.
    # LBs are free during Beget's public beta. If client-IP preservation via
    # externalTrafficPolicy=Local isn't honored by the LB, switch to PROXY
    # protocol: add `lb.beget.com/proxy-protocol: v2` here AND set
    # controller.config.use-proxy-protocol: "true" below.
    # NOTE: Beget assigns the LB's public IP ITSELF and IGNORES the k8s
    # spec.loadBalancerIP field — after install, point DNS at whatever shows up in
    # `kubectl -n ingress-nginx get svc ingress-nginx-controller` EXTERNAL-IP.
    annotations:
      lb.beget.com/type: external
      lb.beget.com/algorithm: round_robin

  # Expose controller metrics for the phase-3 observability umbrella to scrape.
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false # turned on by events-observability in phase 3.

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    # Surface the real client IP to backends behind a cloud LB / proxy.
    use-forwarded-headers: "true"
    # Larger body for webhook payloads (cal.com / Jitsi events).
    proxy-body-size: "8m"

  admissionWebhooks:
    enabled: true

# For a kind cluster there is no cloud LoadBalancer. Install with these extra
# flags instead of editing this file:
#   --set controller.service.type=NodePort \
#   --set controller.hostPort.enabled=true \
#   --set controller.service.externalTrafficPolicy=Cluster
