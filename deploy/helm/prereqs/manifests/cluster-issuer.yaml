# Let's Encrypt ClusterIssuers (cert-manager). Two issuers:
#   - letsencrypt-staging: untrusted staging CA, high rate limits — use first to
#     validate the ACME http01 flow without burning prod quota.
#   - letsencrypt-prod: the trusted production CA — referenced by the public
#     Ingresses via `cert-manager.io/cluster-issuer: letsencrypt-prod`
#     (the per-service charts default `ingress.clusterIssuer` to this).
#
# Both solve the ACME http01 challenge through ingress-nginx, so cert-manager AND
# ingress-nginx must be installed before these are applied.
#
# TODO: replace the placeholder ACME contact email before applying to a real
# cluster (Let's Encrypt sends expiry/renewal notices here).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: TODO-ops@example.com # TODO: set a real ops contact email.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: TODO-ops@example.com # TODO: set a real ops contact email.
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
