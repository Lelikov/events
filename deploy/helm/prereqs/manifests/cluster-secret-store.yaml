# ClusterSecretStore "vault-backend" — the store every service's ExternalSecret
# references (events-common defaults: storeKind ClusterSecretStore, storeName
# vault-backend). Cluster-scoped so a single store serves all namespaces.
#
# Points at the in-cluster Vault (installed via prereqs/vault-values.yaml into
# the `vault` namespace) and authenticates with Vault's Kubernetes auth method
# (role "events"), so no static Vault token lives in the cluster. The Vault
# policy + k8s auth role this depends on are bootstrapped per vault-bootstrap.md.
#
# KV-v2 mount "secret"; services read secret/data/events/<service> via their
# ExternalSecret `dataFrom.extract.key`.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # In-cluster Vault Service DNS. Adjust the namespace segment if you install
      # Vault somewhere other than the `vault` namespace.
      server: "http://vault.vault.svc:8200"
      path: "secret" # KV-v2 mount point.
      version: "v2"
      auth:
        kubernetes:
          # Vault Kubernetes auth mount + role (see vault-bootstrap.md).
          mountPath: "kubernetes"
          role: "events"
          serviceAccountRef:
            # ESO authenticates to Vault as this ServiceAccount's token; the
            # Vault role "events" is bound to it. It lives in the ESO namespace.
            name: "external-secrets"
            namespace: "external-secrets"
