# GitLab CI — build & push the Docker image to GHCR.
# Functionally identical to .github/workflows/publish-image.yml: builds the
# Dockerfile and pushes ghcr.io/lelikov/event-scheduling:{<sha>,latest} on main + tags.
#
# Required CI/CD variables (Settings -> CI/CD -> Variables):
#   REGISTRY_USER     - GHCR username (e.g. a GitHub username / bot)
#   REGISTRY_PASSWORD - GHCR token with write:packages (masked)
# Optional overrides:
#   REGISTRY          - default ghcr.io
#   IMAGE_NAME        - default ghcr.io/lelikov/event-scheduling

stages:
  - publish

variables:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/lelikov/event-scheduling
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"

publish-image:
  stage: publish
  image: docker:27-cli
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
    - docker buildx create --use --name ci-builder || docker buildx use ci-builder
  script:
    - export SHA_TAG="${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - export EXTRA_TAG="${IMAGE_NAME}:${CI_COMMIT_TAG:-latest}"
    - >
      docker buildx build
      --platform linux/amd64
      --file ./Dockerfile
      --tag "$SHA_TAG"
      --tag "$EXTRA_TAG"
      --push
      .
